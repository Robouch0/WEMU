name: Mirror Repository

on:
  push:
    branches:
      - "**"

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ secrets.REPO_EPITECH_MIRROR }}
          ssh_private_key: ${{ secrets.SSH_KEY }}
