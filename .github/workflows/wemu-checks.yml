name: Build WEMU Project

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - 29-github-action-ci-checking-the-cmake-project-itself-is-still-building-as-it-should
      - dev
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt6 and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-tools-dev cmake build-essential

      - name: Create build directory
        run: mkdir -p build

      - name: Configure project with CMake
        run: |
          cd build
          cmake ..

      - name: Build the project
        run: |
          cd build
          cmake --build .
